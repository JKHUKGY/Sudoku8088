# See claude code environment variables documents at https://code.claude.com/docs/en/settings
[env]

[tools]
claude = "latest"
python = "3.12"
uv = "latest"

# === Tasks
[tasks.venv-create]
description = "✨ Create Python virtual environment (.venv)"
run = "uv venv"

[tasks.venv-remove]
description = "💥 Remove Python virtual environment folder (.venv)"
run = "rm -r .venv"

[tasks.inst]
description = "💾 Install Python dependencies (dev, test, doc, etc.) via uv"
run = "uv sync --all-extras"

[tasks.gen-job-search]
description = "📝 Generate LinkedIn job search prompt"
run = "python prompt_generator.py job-search"

[tasks.gen-contact-finder]
description = "📝 Generate LinkedIn contact finder prompt"
run = "python prompt_generator.py contact-finder"

[tasks.gen-cold-message]
description = "📝 Generate LinkedIn cold message prompt"
run = "python prompt_generator.py cold-message"
